title: bas-wiki
lang: en
description: Blade and Sorcery Wiki
repository: KospY/BasSDK
remote_theme: just-the-docs/just-the-docs

defaults:
  # Add styling to all pages front matter
  -
    scope:
      path: "" # an empty string here means all files in the project
    values:
      sass: _includes/extra/styles.scss
      layout: default_sidebar 
      

twitter_username: 
github_username:  KospY

readme_index:
  with_frontmatter: true

exclude:
  - Makefile
  - Gemfile
  - Gemfile.lock

plugins:
  - jemoji
  - jekyll-avatar
  - jekyll-mentions
  - jekyll-github-metadata

# just the docs config

nav_enabled: true

# Color scheme supports "light" (default) and "dark"
color_scheme: dark

callouts:
  note:
    title: Note
    color: purple
  tip:
    title: Tip
    color: grey-lt
  warning:
    title: Warning
    color: yellow
  danger:
    title: Danger
    color: red
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
